<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsletter</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/app.js" defer></script>
</head>
<body>
    <div class="app-container">
        <!-- STATIC HEADER SHELL -->
        <header>
            <div class="nav-controls">
                <button id="btn-back" class="btn" disabled>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" >
                        <path d="m15 18-6-6 6-6"/>
                    </svg>
                    Back
                </button>
                <span id="step-indicator" class="step-indicator" aria-live="polite">Step 1 of 3</span>
                <button id="btn-next" class="btn">
                    Next
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="m9 18 6-6-6-6"/>
                    </svg>
                </button>
            </div>
            <div class="progress-bar-container">
                <div id="progress-fill" class="progress-bar-fill"></div>
            </div>
        </header>

        <!-- DYNAMIC MAIN CONTENT SHELL -->
        <main>
            <h1 id="page-title" class="page-title" tabindex="-1"></h1>
            <p id="page-content" class="page-content"></p>
            <div id="content-area">
                <!-- Content injected via JS -->
            </div>
        </main>
    </div> 
</body>
</html>
